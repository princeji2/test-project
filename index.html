<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Test Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 50px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        h2 {
            color: #667eea;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        ul {
            list-style: none;
            margin-left: 0;
        }
        
        li {
            color: #555;
            margin-bottom: 10px;
            padding-left: 30px;
            position: relative;
            font-size: 1em;
        }
        
        li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
        }
        
        .status-box {
            background: #f0f4ff;
            padding: 20px;
            border-left: 4px solid #667eea;
            border-radius: 5px;
            margin-top: 20px;
            color: #333;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 30px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            h2 {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Test Project</h1>
        <p class="subtitle">This is my first GitHub project.</p>
        
        <h2>👨‍💻 About Me</h2>
        <ul>
            <li>Learning programming</li>
            <li>Exploring Git & GitHub</li>
            <li>Future: Web + IoT Developer</li>
        </ul>
        
        <h2>📌 Status</h2>
        <div class="status-box">
            <p>Currently learning and building projects.</p>
        </div>
    </div>
</body>
</html>
